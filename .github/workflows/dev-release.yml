name: Dev Release

on:
  push:
    branches:
      - master

jobs:
  dev-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build zip
        run: python make_zip.py

      - name: Get version
        id: meta
        run: |
          VERSION=$(python -c 'import re; m = re.search(r"^version\s*=\s*\"([0-9.]+)\"", open("io_scene_valvesource/blender_manifest.toml").read(), re.MULTILINE); print(m.group(1))')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "zip=$GITHUB_WORKSPACE/../pulsesrcops_${VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Delete existing dev release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "dev" --yes --cleanup-tag 2>/dev/null || true

      - name: Create dev pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          NOTES=$(printf '> [!WARNING]\n> This is an automated dev build generated on every commit. It may be unstable, contain hidden bugs, or introduce breaking changes. Use at your own risk.\n\n**Commit:** %s\n\n%s' "${COMMIT_URL}" "${COMMIT_MSG}")
          gh release create "dev" \
            "${{ steps.meta.outputs.zip }}" \
            --title "dev" \
            --notes "${NOTES}" \
            --prerelease
